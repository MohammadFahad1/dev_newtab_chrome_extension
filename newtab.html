<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="icon" type="image/svg+xml" href="home.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    :root {
      --mouse-x: 50%;
      --mouse-y: 50%;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system_ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    /* Dynamic Background */
    #background {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(16, 185, 129, 0.15) 0%, transparent 60%),
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      z-index: 0;
      pointer-events: none;
      transition: background 0.1s ease;
    }

    .container {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(16, 185, 129, 0.25);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 920px;
      box-shadow: 0 30px 70px -15px rgba(0, 0, 0, 0.6);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 40px 80px -10px rgba(16, 185, 129, 0.25);
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar-small {
      width: 36px;
      height: 36px;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.4);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    #live-time {
      font-family: monospace;
      font-size: 15px;
      color: #888;
      text-align: right;
    }

    /* Profile Section */
    .profile {
      text-align: center;
      margin-bottom: 50px;
    }

    .big-avatar {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      overflow: hidden;
      margin: 0 auto 24px;
      border: 4px solid rgba(16, 185, 129, 0.3);
      box-shadow: 0 0 60px -10px rgba(16, 185, 129, 0.5);
    }

    .big-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .greeting {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(90deg, #4ade80, #10b981, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      letter-spacing: -1.5px;
    }

    .subtitle {
      font-size: 19px;
      color: #aaa;
      margin-bottom: 16px;
    }

    .description {
      max-width: 420px;
      margin: 0 auto;
      color: #ccc;
      line-height: 1.5;
      font-size: 17px;
    }

    /* Social Links */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 16px 8px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
    }

    .social-link:hover {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.4);
      transform: translateY(-6px) scale(1.05);
    }

    .icon-wrapper {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .social-link:hover .icon-wrapper {
      transform: scale(1.15);
    }

    .social-name {
      font-size: 13px;
      font-weight: 500;
      color: #bbb;
      transition: color 0.3s;
    }

    .social-link:hover .social-name {
      color: #fff;
    }

    /* Footer */
    .footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #666;
      font-family: monospace;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .cursor {
      display: inline-block;
      width: 6px;
      height: 1.1em;
      background: #4ade80;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

  <script>
    // Mouse glow effect
    const bg = document.getElementById('background');
    
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      bg.style.setProperty('--mouse-x', `${x}%`);
      bg.style.setProperty('--mouse-y', `${y}%`);
    });

    // Live Clock
    function updateClock() {
      const timeEl = document.getElementById('live-time');
      setInterval(() => {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        const ampm = hours >= 12 ? 'pm' : 'am';
        hours = hours % 12 || 12;
        timeEl.textContent = `${hours}:${minutes.toString().padStart(2, '0')}${ampm}`;
      }, 1000);
    }

    // Dynamic Greeting
    function setGreeting() {
      const greetingEl = document.getElementById('greeting');
      const hour = new Date().getHours();
      
      let greeting = '';
      if (hour < 5) greeting = "Good night, Fahad";
      else if (hour < 12) greeting = "Good morning, Fahad";
      else if (hour < 17) greeting = "Good afternoon, Fahad";
      else greeting = "Good evening, Fahad";

      greetingEl.textContent = greeting;
    }

    // Initialize everything
    window.onload = () => {
      updateClock();
      setGreeting();
    };
  </script>
